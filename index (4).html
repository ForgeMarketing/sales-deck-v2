<style>
  :root{
    --steel-900:#0f1113;--steel-800:#14161a;--steel-700:#1d2126;--steel-600:#2a2f37;--steel-500:#3a414b;
    --paper:#faf8f5;--paper-2:#f1ede7;--ink:#15181c;--ink-soft:#4a5058;
    --ember:#ff5a1f;--gold:#f6a623;--patina:#2f8f83;
    --line:rgba(255,255,255,.10);--line-ink:rgba(20,24,28,.12);
    --heat:linear-gradient(100deg,#ff4d14 0%,#ff7a1f 45%,#ffb020 100%);
    --shadow:0 24px 60px -20px rgba(0,0,0,.55);font-synthesis:none;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--steel-900);color:var(--paper);font-family:'Inter',system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}

  /* launcher */
  .launch{position:fixed;inset:0;display:none;flex-direction:column;justify-content:center;padding:clamp(28px,5vw,80px);background:var(--steel-800);}
  .launch.show{display:flex;}
  .launch .glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(55% 55% at 78% 20%,rgba(255,90,31,.18),transparent 60%);}
  .launch-inner{margin:auto;width:100%;max-width:1040px;position:relative;}
  .launch .brand{font-family:'Anton',sans-serif;font-size:clamp(56px,10vw,120px);line-height:.82;text-transform:uppercase;}
  .launch .brand span{background:var(--heat);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .launch .sub{color:#aeb4bb;margin:14px 0 40px;font-size:clamp(15px,1.7vw,19px);}
  .track-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  .tc{text-align:left;cursor:pointer;background:var(--steel-700);border:1px solid var(--line);border-radius:16px;padding:28px 26px;color:inherit;transition:.16s;}
  .tc:hover{border-color:var(--ember);transform:translateY(-4px);}
  .tc .n{font-family:'Space Mono',monospace;color:var(--gold);font-size:12px;letter-spacing:.2em;}
  .tc h3{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;font-size:26px;margin:14px 0 10px;letter-spacing:.02em;}
  .tc p{color:#c3c9d0;font-size:14px;line-height:1.5;}
  .tc .go{margin-top:18px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--ember);}

  /* stage */
  .stage{position:fixed;inset:0;display:none;}
  .stage.show{display:block;}
  .slide{position:absolute;inset:0;display:none;padding:clamp(28px,5vw,80px);opacity:0;transition:opacity .38s ease;overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  .slide.active{display:flex;opacity:1;}
  .slide.dark{background:var(--steel-800);}
  .slide.light{background:var(--paper);color:var(--ink);}
  .inner{margin:auto;width:100%;max-width:1120px;}

  .eyebrow{font-family:'Space Mono',monospace;font-size:clamp(11px,1.05vw,13px);letter-spacing:.28em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:.7em;}
  .light .eyebrow{color:#b26a12;}
  .eyebrow::before{content:"";width:26px;height:2px;background:var(--ember);display:inline-block;}
  h2{font-family:'Anton',sans-serif;font-weight:400;line-height:.98;text-transform:uppercase;letter-spacing:.01em;font-size:clamp(34px,5.4vw,66px);}
  .lede{font-size:clamp(16px,1.7vw,21px);line-height:1.5;color:#cfd4da;max-width:60ch;}
  .light .lede{color:var(--ink-soft);}

  /* title */
  .glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(60% 55% at 22% 78%,rgba(255,90,31,.22),transparent 60%);}
  .brand{font-family:'Anton',sans-serif;font-size:clamp(70px,13vw,170px);line-height:.82;text-transform:uppercase;}
  .brand span{background:var(--heat);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .title-sub{margin-top:22px;font-size:clamp(17px,2vw,23px);color:#dfe3e8;max-width:46ch;line-height:1.45;}
  .title-meta{margin-top:40px;display:flex;gap:30px;flex-wrap:wrap;color:#8b929b;font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.1em;}
  .title-meta b{color:var(--gold);font-weight:400;}

  /* problem */
  .prob-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(28px,4vw,64px);align-items:center;}
  .prob-list{margin-top:24px;display:flex;flex-direction:column;gap:13px;}
  .prob-item{display:flex;gap:14px;align-items:flex-start;font-size:16px;color:#cfd4da;line-height:1.45;}
  .prob-item .x{color:var(--ember);font-family:'Space Mono',monospace;font-weight:700;flex:none;}
  .prob-quote{border-left:3px solid var(--ember);padding:18px 22px;background:var(--steel-700);border-radius:0 10px 10px 0;}
  .prob-quote p{font-size:clamp(17px,1.9vw,22px);line-height:1.4;color:#f2f4f6;font-weight:500;}
  .prob-quote cite{display:block;margin-top:12px;font-style:normal;color:#8b929b;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.12em;}

  /* do */
  .do-head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;margin-bottom:36px;}
  .do-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  .do-card{background:var(--steel-700);border:1px solid var(--line);border-radius:14px;padding:26px 24px;}
  .do-card .n{font-family:'Space Mono',monospace;color:var(--gold);font-size:12px;letter-spacing:.2em;}
  .do-card h3{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;font-size:22px;margin:14px 0 10px;letter-spacing:.02em;}
  .do-card p{color:#c3c9d0;font-size:14.5px;line-height:1.5;}

  /* examples */
  .ex-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:32px;}
  .ex{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);aspect-ratio:16/10;background:linear-gradient(160deg,#20252b,#12151a);display:flex;flex-direction:column;justify-content:flex-end;padding:22px;cursor:pointer;text-decoration:none;color:inherit;}
  .ex:hover{border-color:var(--ember);}
  .ex .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;background:var(--heat);display:grid;place-items:center;box-shadow:var(--shadow);}
  .ex .play::after{content:"";border-left:18px solid #14161a;border-top:11px solid transparent;border-bottom:11px solid transparent;margin-left:5px;}
  .ex .tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;}
  .ex h4{font-family:'Anton',sans-serif;font-weight:400;font-size:22px;text-transform:uppercase;margin-top:6px;letter-spacing:.02em;}
  .ex .slot{position:absolute;top:12px;right:14px;font-family:'Space Mono',monospace;font-size:10px;color:#6f767f;letter-spacing:.1em;}
  .cat-toggle{display:flex;gap:8px;margin:22px 0 4px;flex-wrap:wrap;}
  .cat-btn{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#9aa1a9;background:var(--steel-700);border:1px solid var(--line);border-radius:999px;padding:9px 16px;cursor:pointer;transition:.15s;}
  .cat-btn:hover{color:#fff;border-color:var(--ember);}
  .cat-btn.on{color:#14161a;background:var(--gold);border-color:var(--gold);font-weight:700;}
  .cat-group{display:none;}
  .cat-group.on{display:block;}
  .ex.ph{cursor:default;border-style:dashed;opacity:.72;}
  .ex.ph:hover{border-color:var(--line);}
  .ex.ph .slot{position:static;color:#8b929b;text-transform:uppercase;}
  .exvid-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:20px;}
  .exv{display:flex;flex-direction:column;gap:8px;min-width:0;}
  .exvid{width:100%;height:46vh;max-height:500px;object-fit:contain;background:#0a0b0d;border:1px solid var(--line);border-radius:14px;display:block;}
  .exvcap{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .exvcap .tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;}
  .exvcap h4{font-family:'Anton',sans-serif;font-weight:400;font-size:16px;text-transform:uppercase;letter-spacing:.02em;}

  /* proof */
  .proof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:32px;}
  .quote{background:var(--steel-700);border:1px solid var(--line);border-radius:14px;padding:26px 24px;display:flex;flex-direction:column;gap:16px;}
  .quote .stars{color:var(--gold);letter-spacing:.18em;font-size:14px;}
  .quote p{font-size:15.5px;line-height:1.5;color:#e6e9ec;}
  .quote cite{font-style:normal;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;color:#8b929b;margin-top:auto;}
  .proof-foot{margin-top:24px;padding:14px 18px;border:1px dashed var(--line);border-radius:12px;color:#aeb4bb;font-size:13px;display:flex;gap:12px;align-items:center;}
  .proof-foot b{color:var(--gold);font-weight:600;}

  /* steps */
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:36px;}
  .step{position:relative;padding-top:24px;}
  .step .num{font-family:'Anton',sans-serif;font-size:clamp(40px,5vw,64px);line-height:.8;color:transparent;-webkit-text-stroke:1.5px var(--ember);}
  .step h3{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;font-size:19px;margin:14px 0 8px;letter-spacing:.02em;color:var(--ink);}
  .step p{font-size:14px;line-height:1.5;color:var(--ink-soft);}
  .step .tick{position:absolute;top:32px;right:0;font-family:'Space Mono',monospace;font-size:11px;color:#b26a12;letter-spacing:.1em;}

  /* pricing */
  .price-head{text-align:center;margin-bottom:32px;}
  .price-head h2{color:var(--ink);}
  .tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:stretch;}
  .tier{position:relative;border:1px solid var(--line-ink);border-radius:16px;padding:30px 26px;background:#fff;display:flex;flex-direction:column;}
  .tier.pop{border:2px solid var(--ember);box-shadow:0 20px 44px -18px rgba(255,90,31,.4);transform:translateY(-8px);}
  .tier .flag{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--heat);color:#14161a;font-family:'Space Mono',monospace;font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:6px 16px;border-radius:999px;white-space:nowrap;}
  .tier .plan{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);}
  .tier .price{font-family:'Anton',sans-serif;font-size:clamp(38px,5vw,56px);line-height:1;margin:12px 0 4px;color:var(--ink);letter-spacing:.01em;}
  .tier .per{font-size:13px;color:var(--ink-soft);}
  .tier ul{list-style:none;margin:22px 0;display:flex;flex-direction:column;gap:11px;}
  .tier li{display:flex;gap:10px;font-size:14.5px;line-height:1.4;color:var(--ink);}
  .tier li::before{content:"";flex:none;width:18px;height:18px;margin-top:1px;border-radius:50%;background:var(--patina);
    -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='white' d='M9.55 17.6 4.9 12.95l1.4-1.4 3.25 3.25 8.15-8.15 1.4 1.4z'/></svg>") center/14px no-repeat;
            mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='white' d='M9.55 17.6 4.9 12.95l1.4-1.4 3.25 3.25 8.15-8.15 1.4 1.4z'/></svg>") center/14px no-repeat;}
  .tier .cta{margin-top:auto;display:block;text-align:center;text-decoration:none;font-weight:600;font-size:15px;padding:14px;border-radius:10px;border:1px solid var(--ink);color:var(--ink);transition:.15s;}
  .tier .cta:hover{background:var(--ink);color:#fff;}
  .tier.pop .cta{background:var(--heat);border:none;color:#14161a;font-weight:700;}
  .tier.pop .cta:hover{filter:brightness(1.06);}
  .draft-ribbon{position:absolute;top:14px;right:14px;background:#ffe9c2;color:#8a5300;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;padding:4px 9px;border-radius:6px;text-transform:uppercase;}
  .tier.ph{background:var(--paper-2);border:2px dashed var(--line-ink);justify-content:center;align-items:center;text-align:center;color:var(--ink-soft);}
  .tier.ph .plan{color:#b26a12;}
  .tier.ph p{font-size:13px;line-height:1.5;margin-top:10px;max-width:24ch;}
  .price-note{text-align:center;margin-top:22px;font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.06em;color:#b26a12;}
  .tier .vids{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em;color:var(--ember);text-transform:uppercase;margin-top:5px;}
  .tier .price .per{font-family:'Inter',sans-serif;font-size:13px;color:var(--ink-soft);margin-left:7px;letter-spacing:0;text-transform:none;font-weight:400;}
  .tier .desc{font-size:13px;line-height:1.5;color:var(--ink-soft);margin:14px 0 20px;}
  .acts{margin-top:auto;display:flex;flex-direction:column;gap:8px;}
  .copybtn{cursor:pointer;text-align:center;font-weight:600;font-size:14.5px;padding:13px;border-radius:10px;border:1px solid var(--ink);color:var(--ink);background:#fff;transition:.15s;font-family:inherit;}
  .copybtn:hover{background:var(--ink);color:#fff;}
  .tier.pop .copybtn{background:var(--heat);border:none;color:#14161a;font-weight:700;}
  .tier.pop .copybtn:hover{filter:brightness(1.06);}
  .copybtn.ok{background:var(--patina)!important;color:#fff!important;border:1px solid var(--patina)!important;}
  .copybtn.pending{opacity:.5;cursor:not-allowed;border-style:dashed;}
  .linkopen{text-align:center;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink-soft);text-decoration:none;}
  .linkopen:hover{color:var(--ember);}
  .includes{margin-top:24px;border-top:1px solid var(--line-ink);padding-top:18px;}
  .includes .il{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#b26a12;}
  .includes ul{list-style:none;display:flex;flex-wrap:wrap;gap:9px 26px;margin-top:12px;}
  .includes li{display:flex;gap:8px;font-size:13.5px;color:var(--ink);}
  .includes li::before{content:"—";color:var(--patina);}

  /* mechanism */
  .mech{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(28px,4vw,56px);align-items:center;}
  .mgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;}
  .mtile{aspect-ratio:3/4;border-radius:6px;background:var(--steel-600);border:1px solid var(--line);}
  .mtile.win{background:var(--heat);border:none;box-shadow:0 0 0 3px rgba(255,90,31,.28),0 10px 24px -8px rgba(255,90,31,.6);}
  .mcap{margin-top:14px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.06em;color:#9aa1a9;}
  .mbeats{display:flex;flex-direction:column;gap:16px;}
  .mbeat{display:flex;gap:14px;align-items:flex-start;}
  .mbeat .mn{font-family:'Space Mono',monospace;color:transparent;-webkit-text-stroke:1px var(--ember);font-size:22px;font-weight:700;flex:none;}
  .mbeat strong{display:block;font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:.02em;font-size:19px;color:#fff;}
  .mbeat span{font-size:14px;color:#c3c9d0;line-height:1.45;}
  /* baseline flow */
  .flow3{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:16px;align-items:stretch;margin-top:32px;}
  .fstep{background:var(--steel-700);border:1px solid var(--line);border-radius:14px;padding:24px 22px;}
  .fstep .fn{font-family:'Space Mono',monospace;color:var(--gold);font-size:12px;letter-spacing:.2em;}
  .fstep h3{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;font-size:19px;margin:12px 0 10px;letter-spacing:.02em;}
  .fstep p{font-size:14px;color:#c3c9d0;line-height:1.5;}
  .farrow{color:var(--ember);font-size:24px;align-self:center;}
  /* timeline */
  .tl3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px;}
  .tlc{background:#fff;border:1px solid var(--line-ink);border-radius:14px;padding:26px 24px;}
  .tlc.pop{border:2px solid var(--ember);box-shadow:0 18px 40px -18px rgba(255,90,31,.4);}
  .tlc .tln{font-family:'Space Mono',monospace;color:#b26a12;font-size:12px;letter-spacing:.16em;text-transform:uppercase;}
  .tlc h3{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;font-size:22px;margin:10px 0 8px;color:var(--ink);letter-spacing:.02em;}
  .tlc p{font-size:14px;color:var(--ink-soft);line-height:1.5;}
  /* roi calculator */
  .roi{display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,3vw,44px);align-items:start;}
  .roi-inputs{display:flex;flex-direction:column;gap:16px;}
  .rin{display:flex;flex-direction:column;gap:8px;}
  .rin>span{font-size:13.5px;color:var(--ink-soft);font-weight:500;}
  .rfield{display:flex;align-items:center;gap:6px;border:1px solid var(--line-ink);border-radius:10px;padding:0 14px;background:#fff;}
  .rfield i{font-style:normal;color:var(--ink-soft);font-family:'Anton',sans-serif;}
  .rfield input{border:none;outline:none;font-size:20px;font-family:'Anton',sans-serif;color:var(--ink);padding:14px 0;width:100%;background:transparent;}
  .roi-out{display:flex;flex-direction:column;gap:12px;}
  .rout{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--paper-2);border:1px solid var(--line-ink);border-radius:12px;padding:16px 20px;}
  .rout span{font-size:13.5px;color:var(--ink-soft);}
  .rout b{font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(22px,3vw,30px);color:var(--ink);letter-spacing:.01em;white-space:nowrap;}
  .rout.warn{background:#241811;border-color:rgba(255,90,31,.4);}
  .rout.warn span{color:#e8c9b6;}
  .rout.warn b{background:var(--heat);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .rgroup{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin:6px 0 0;}
  .rout.big{padding:22px 20px;}
  .rout.big b{font-size:clamp(28px,4.4vw,42px);}
  .rfield input::placeholder{color:#b8bcc2;}
  /* guarantee */
  .guar{display:grid;grid-template-columns:1fr 1fr;gap:clamp(30px,4vw,60px);align-items:center;}
  .guar-badge{aspect-ratio:1;max-width:340px;margin:auto;border-radius:50%;background:radial-gradient(circle at 30% 25%,#20252b,#0f1113);border:2px solid var(--patina);display:grid;place-items:center;text-align:center;padding:40px;box-shadow:var(--shadow);}
  .guar-badge .big{font-family:'Anton',sans-serif;font-size:clamp(54px,8vw,92px);line-height:1.06;display:inline-block;padding-top:.08em;background:var(--heat);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .guar-badge .lbl{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.24em;color:var(--patina);margin-top:12px;text-transform:uppercase;}
  .guar-body h2{margin:12px 0 18px;}
  .guar-body p{color:#cfd4da;line-height:1.55;font-size:16px;margin-bottom:16px;max-width:52ch;}
  .guar-body .fine{font-family:'Space Mono',monospace;font-size:12.5px;color:#8b929b;line-height:1.6;border-top:1px solid var(--line);padding-top:16px;letter-spacing:.02em;}

  /* takeover cross-sell */
  .to-wrap{display:grid;grid-template-columns:.9fr 1.1fr;gap:clamp(30px,4vw,56px);align-items:center;}

function sTimeline(t){
  return `<section class="slide light" data-notes="This justifies the 3-month commitment. Month one can't give you data — the system needs the full arc. Tie it back to how long they've already been stuck.">
    <div class="inner">
      <div class="eyebrow">Why it's a system, not a one-off</div>

      <div class="tl3">
        <div class="tlc"><span class="tln">Month 1</span><h3>Test</h3><p>Launch 20 creatives and gather real data on what your audience responds to.</p></div>
        <div class="tlc"><span class="tln">Month 2</span><h3>Iterate</h3><p>Build off the winner, cut the losers, and sharpen what's working.</p></div>
        <div class="tlc pop"><span class="tln">Month 3</span><h3>Compound</h3><p>Scale the proven winners and stack results month over month.</p></div>

    </div></section>`;
}
function sRoi(t){
  return `<section class="slide light" data-notes="Run this on the price conversation. Fill their three numbers — ad spend, current cost per lead, average customer value. Then enter a conservative close rate and a conservative target cost per lead you're confident a winning creative can hit. The headline is what a stalled account costs them every month. Keep the target conservative so it survives scrutiny — it's a scenario, not a guarantee.">
    <div class="inner">
      <div class="eyebrow">Run your numbers</div>
      <h2 style="color:var(--ink);margin:14px 0 4px">What's every month<br>of waiting costing you?</h2>
      <p class="lede" style="margin-bottom:20px">Your real numbers, conservative assumptions — your own math, not a projection.</p>
      <div class="roi">
        <div class="roi-inputs">
          <div class="rgroup">Your numbers</div>
          <label class="rin"><span>Monthly ad spend</span><div class="rfield"><i>$</i><input id="roi-spend" type="number" inputmode="numeric" placeholder="e.g. 5000" oninput="forgeRoi()"></div></label>
          <label class="rin"><span>Current cost per lead</span><div class="rfield"><i>$</i><input id="roi-cpl" type="number" inputmode="numeric" placeholder="e.g. 100" oninput="forgeRoi()"></div></label>
          <label class="rin"><span>Average customer value</span><div class="rfield"><i>$</i><input id="roi-val" type="number" inputmode="numeric" placeholder="e.g. 7000" oninput="forgeRoi()"></div></label>
          <div class="rgroup">Conservative — entered live</div>
          <label class="rin"><span>Close rate · leads to customers</span><div class="rfield"><input id="roi-close" type="number" inputmode="numeric" placeholder="e.g. 15" oninput="forgeRoi()"><i>%</i></div></label>
          <label class="rin"><span>Target cost per lead with a winner</span><div class="rfield"><i>$</i><input id="roi-target" type="number" inputmode="numeric" placeholder="e.g. 60" oninput="forgeRoi()"></div></label>
        </div>
        <div class="roi-out">
          <div class="rout warn big"><span>The cost of waiting, every month</span><b id="roi-gap">—</b></div>
          <div class="rout"><span>Extra customers / month</span><b id="roi-extra">—</b></div>
          <div class="rout"><span>Revenue / month with a winner</span><b id="roi-newrev">—</b></div>
        </div>
      </div>
      <p class="price-note" style="color:#b26a12">Conservative inputs, entered live — a scenario, not a guarantee.</p>
    </div></section>`;
}
function forgeRoi(){
  const num=id=>{const el=document.getElementById(id);if(!el)return null;const v=parseFloat(el.value);return isNaN(v)?null:v;};
  const set=(id,txt)=>{const el=document.getElementById(id);if(el)el.textContent=txt;};
  const money=n=>'$'+Math.round(n).toLocaleString();
  const spend=num('roi-spend'),cpl=num('roi-cpl'),val=num('roi-val'),close=num('roi-close'),tgt=num('roi-target');
  const ready=spend!=null&&cpl!=null&&val!=null&&close!=null&&tgt!=null&&cpl>0&&tgt>0;
  if(!ready){set('roi-gap','—');set('roi-extra','—');set('roi-newrev','—');return;}
  const cr=close/100;
  const custNow=(spend/cpl)*cr, custWin=(spend/tgt)*cr;
  const revNow=custNow*val, revWin=custWin*val;
  const gap=Math.max(0,revWin-revNow), extra=Math.max(0,custWin-custNow);
  set('roi-gap',money(gap)+' / mo');
  set('roi-extra',(Math.round(extra*10)/10).toLocaleString()+' / mo');
  set('roi-newrev',money(revWin)+' / mo');
}
function buildTrack(key){
  const t=TRACKS[key];
  const parts=[sTitle(t),sProblem(t)];
  if(t.system){ parts.push(sMechanism(t),sBaseline(t)); }
  parts.push(sDo(t),sExamples(t),sProof(t),sSteps(t));
  if(t.system){ parts.push(sTimeline(t)); }
  parts.push(sPricing(t));
  if(t.system){ parts.push(sRoi(t)); }
  parts.push(sGuarantee(t));
  if(t.crossSell) parts.push(sTakeoverCross());
  parts.push(sNext(t));
  return parts.join("");
}

/* ============================ NAV / ROUTER ============================ */
const stage=document.getElementById('stage'), launch=document.getElementById('launch');
const hud=document.getElementById('hud'), topbar=document.getElementById('topbar'), pills=document.getElementById('pills');
const notes=document.getElementById('notes'), notesText=document.getElementById('notes-text'), hint=document.getElementById('hint');
const curEl=document.getElementById('cur'), totEl=document.getElementById('tot'), dotsWrap=document.getElementById('dots');
let slides=[], dots=[], idx=0, notesOn=false, active=null;

pills.innerHTML=Object.keys(TRACKS).map(k=>`<a href="#${k}" data-k="${k}">${TRACKS[k].label}</a>`).join("");

function fallbackCopy(text){try{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();const ok=document.execCommand('copy');document.body.removeChild(ta);return ok;}catch(_){return false;}}
document.addEventListener('click',e=>{
  const b=e.target.closest('.copybtn'); if(!b||b.classList.contains('pending'))return;
  const link=b.dataset.link||""; const orig=b.textContent;
  const flash=(txt,ok)=>{b.textContent=txt;b.classList.toggle('ok',ok);setTimeout(()=>{b.textContent=orig;b.classList.remove('ok');},1600);};
  const manual=()=>{try{window.prompt('Copy this link (Ctrl/Cmd+C, Enter):',link);}catch(_){}flash('Copy manually ↑',false);};
  const okFlash=()=>flash('Copied ✓',true);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(link).then(okFlash).catch(()=>{fallbackCopy(link)?okFlash():manual();});
  } else { fallbackCopy(link)?okFlash():manual(); }
});

function showLauncher(){
  active=null;
  launch.classList.add('show'); stage.classList.remove('show');
  hud.classList.remove('show'); topbar.classList.remove('show'); hint.classList.remove('show');
  notes.classList.remove('show'); notesOn=false;
  document.body.classList.remove('light-slide');
}
function render(key){
  if(!TRACKS[key]){ showLauncher(); return; }
  active=key;
  launch.classList.remove('show'); stage.classList.add('show');
  hud.classList.add('show'); topbar.classList.add('show'); hint.classList.add('show');
  stage.innerHTML=buildTrack(key);
  slides=[...stage.querySelectorAll('.slide')];
  totEl.textContent=String(slides.length).padStart(2,'0');
  dotsWrap.innerHTML=""; dots=[];
  slides.forEach((_,n)=>{const d=document.createElement('i');d.onclick=()=>go(n);dotsWrap.appendChild(d);dots.push(d);});
  [...pills.children].forEach(a=>a.classList.toggle('on',a.dataset.k===key));
  idx=0; go(0);
}
function go(n){
  if(!slides.length) return;
  idx=Math.max(0,Math.min(slides.length-1,n));
  slides.forEach((s,k)=>s.classList.toggle('active',k===idx));
  dots.forEach((d,k)=>d.classList.toggle('on',k===idx));
  curEl.textContent=String(idx+1).padStart(2,'0');
  const light=slides[idx].classList.contains('light');
  document.body.classList.toggle('light-slide',light);
  notesText.textContent=slides[idx].dataset.notes||"";
}
const nextFn=()=>go(idx+1), prevFn=()=>go(idx-1);
document.getElementById('next').onclick=nextFn;
document.getElementById('prev').onclick=prevFn;
document.getElementById('zr').onclick=()=>{ if(active) nextFn(); };
document.getElementById('zl').onclick=()=>{ if(active) prevFn(); };
document.getElementById('back').onclick=()=>{ location.hash=""; };
document.querySelectorAll('.tc').forEach(b=>b.onclick=()=>{ location.hash=b.dataset.track; });

document.addEventListener('keydown',e=>{
  if(!active) return;
  const _t=(e.target.tagName||'').toLowerCase();
  if(e.target.isContentEditable||_t==='input'||_t==='textarea'||_t==='select') return;
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();nextFn();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prevFn();}
  else if(e.key==='Home'){go(0);} else if(e.key==='End'){go(slides.length-1);}
  else if(e.key==='Escape'){location.hash="";}
  else if(e.key.toLowerCase()==='n'){notesOn=!notesOn;notes.classList.toggle('show',notesOn);}
  else if(/^[1-9]$/.test(e.key)){go(parseInt(e.key)-1);}
});
document.addEventListener('click',e=>{
  const cb=e.target.closest('.cat-btn'); if(!cb)return;
  const scope=cb.closest('.inner'); if(!scope)return;
  scope.querySelectorAll('.cat-btn').forEach(x=>x.classList.toggle('on',x===cb));
  const c=cb.dataset.cat;
  scope.querySelectorAll('.cat-group').forEach(g=>g.classList.toggle('on',g.dataset.cat===c));
});
let tsx=0,tsy=0,tst=0;
document.addEventListener('touchstart',e=>{if(!active||e.touches.length!==1)return;const t=e.touches[0];tsx=t.clientX;tsy=t.clientY;tst=Date.now();},{passive:true});
document.addEventListener('touchend',e=>{
  if(!active)return;const t=e.changedTouches[0];if(!t)return;
  const dx=t.clientX-tsx,dy=t.clientY-tsy,dt=Date.now()-tst;
  if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.8 && dt<700){
    if(e.target.closest('a,button')) return;   // let taps/drags on links & buttons work
    dx<0 ? nextFn() : prevFn();
  }
},{passive:true});
window.addEventListener('hashchange',()=>render(location.hash.slice(1)));
render(location.hash.slice(1));
</script>
